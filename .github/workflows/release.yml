name: Auto Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: zulu

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Determine next version
        id: version
        shell: bash
        run: |
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            # 满 10 进位：patch 到 10 进位到 minor，minor 到 10 进位到 major。
            # 例: 1.0.9 -> 1.1.0, 1.9.9 -> 2.0.0
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -ge 10 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            if [ "$MINOR" -ge 10 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build --build-cache --no-daemon -PdisableSpotless=true

      - name: Rename JAR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd build/libs
          # 按分类把主/dev/sources 三个 jar 都改成 tag 版本号，避免 release 里 dev/sources 仍带哈希版本。
          for f in *.jar; do
            case "$f" in
              *-dev.jar)     mv "$f" "GTNotCool-${VERSION}-dev.jar" ;;
              *-sources.jar) mv "$f" "GTNotCool-${VERSION}-sources.jar" ;;
              *)             mv "$f" "GTNotCool-${VERSION}.jar" ;;
            esac
          done

      - name: Create Tag and Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: build/libs/*.jar
          generate_release_notes: true
